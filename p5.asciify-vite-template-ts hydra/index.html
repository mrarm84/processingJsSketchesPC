<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.asciify-vite-template-ts</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.1);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-size: 11px;
      z-index: 1000;
      max-width: 400px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .controls.collapsed {
      left: -420px;
    }

    .controls-toggle {
      position: absolute;
      top: 50%;
      right: -30px;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      border: none;
      border-radius: 0 4px 4px 0;
      width: 30px;
      height: 60px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-left: none;
      transition: all 0.3s ease;
    }

    .controls-toggle:hover {
      background: rgba(0, 0, 0, 0.9);
    }

    .controls.collapsed .controls-toggle {
      right: -30px;
    }

    .control-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .control-group {
      margin-bottom: 12px;
    }

    .control-group.small {
      flex: 1;
      min-width: 80px;
    }

    .control-group.small label {
      display: block;
      margin-bottom: 3px;
      font-weight: bold;
      font-size: 10px;
    }

    .control-group.small select,
    .control-group.small input[type="range"] {
      width: 100%;
      padding: 2px 4px;
      border-radius: 3px;
      border: 1px solid #ccc;
      font-size: 10px;
    }

    .control-group.small input[type="range"] {
      height: 8px;
    }

    .control-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .control-group select,
    .control-group input[type="range"] {
      width: 100%;
      padding: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    .toggle-group {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .color-picker-group {
      margin-top: 8px;
    }

    .color-picker-group input[type="color"] {
      width: 50px;
      height: 30px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .color-picker-group.hidden {
      display: none;
    }

    .start-camera-btn {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .start-camera-btn:hover {
      background: #45a049;
    }

    .start-camera-btn:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }

    .control-group textarea {
      width: 100%;
      padding: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-family: monospace;
      font-size: 12px;
      resize: vertical;
    }

    .paste-btn {
      margin-top: 5px;
      padding: 5px 10px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    .paste-btn:hover {
      background: #1976D2;
    }

    .control-group.small input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-left: 5px;
    }

    .control-group.small label {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    /* CRT effect overlay */
    .crt-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
      background:
        linear-gradient(rgba(18, 16, 16, 0.1) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 2px, 3px 100%;
      animation: crt-flicker 0.15s infinite linear alternate;
    }

    .crt-overlay::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: rgba(18, 16, 16, 0.1);
      animation: crt-scanlines 0.1s linear infinite;
    }

    @keyframes crt-flicker {
      0% { opacity: 0.8; }
      100% { opacity: 1; }
    }

    @keyframes crt-scanlines {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }

    .toggle-btn {
      padding: 5px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #333;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .toggle-btn.active {
      background: #666;
    }

    .toggle-btn:hover {
      background: #555;
    }
  </style>
</head>

<body>
  <div class="controls">
    <div class="control-row">
      <div class="control-group small">
        <label for="renderer-select">Mode:</label>
        <select id="renderer-select">
          <option value="brightness">Brightness</option>
          <option value="edge">Edge Detection</option>
          <option value="chars">Character Focus</option>
          <option value="background">Background Pattern</option>
        </select>
      </div>

      <div class="control-group small">
        <label for="blendmode-select">Blend:</label>
        <select id="blendmode-select">
          <option value="BLEND">Normal</option>
          <option value="ADD">Add</option>
          <option value="DARKEST">Darkest</option>
          <option value="LIGHTEST">Lightest</option>
          <option value="DIFFERENCE">Difference</option>
          <option value="EXCLUSION">Exclusion</option>
          <option value="MULTIPLY">Multiply</option>
          <option value="SCREEN">Screen</option>
          <option value="OVERLAY">Overlay</option>
          <option value="HARD_LIGHT">Hard Light</option>
          <option value="SOFT_LIGHT">Soft Light</option>
          <option value="DODGE">Dodge</option>
          <option value="BURN">Burn</option>
        </select>
      </div>

      <div class="control-group small">
        <label for="char-invert-select">Char Inv:</label>
        <select id="char-invert-select">
          <option value="none">None</option>
          <option value="invert">Invert</option>
          <option value="random">Random</option>
          <option value="neighbour">Neighbour</option>
        </select>
      </div>

      <div class="control-group small">
        <label for="bg-invert-select">BG Inv:</label>
        <select id="bg-invert-select">
          <option value="none">None</option>
          <option value="invert">Invert</option>
          <option value="random">Random</option>
          <option value="neighbour">Neighbour</option>
        </select>
      </div>
    </div>

    <div class="control-row">
      <div class="control-group small">
        <label for="brightness-slider">Bright:</label>
        <input type="range" id="brightness-slider" min="-100" max="100" value="0" step="1">
        <span id="brightness-value">0</span>
      </div>

      <div class="control-group small">
        <label for="char-size-select">Size:</label>
        <select id="char-size-select">
          <option value="6">6</option>
          <option value="8">8</option>
          <option value="12" selected>12</option>
          <option value="16">16</option>
          <option value="24">24</option>
        </select>
      </div>

      <div class="control-group small">
        <label for="charset-select">Chars:</label>
        <select id="charset-select">
          <option value="default">Default ASCII</option>
          <option value="extended">Extended ASCII</option>
          <option value="blocks">Block Shading</option>
          <option value="shapes">Geometric Shapes</option>
          <option value="petscii">PETSCII Symbols</option>
          <option value="dots">Dotted Patterns</option>
          <option value="lines">Box Drawing</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <div class="control-group small">
        <label for="threshold-slider">Thresh:</label>
        <input type="range" id="threshold-slider" min="0" max="255" value="128" step="1">
        <span id="threshold-value">128</span>
      </div>
    </div>

    <div class="control-row">
      <div class="control-group small">
        <label for="crt-checkbox">CRT Effect:</label>
        <input type="checkbox" id="crt-checkbox">
      </div>

      <div class="control-group small">
        <button id="start-camera-btn" class="start-camera-btn">Start Camera</button>
      </div>
    </div>

    <button class="controls-toggle" id="controls-toggle">‹</button>


    <div class="control-group">
      <label for="custom-charset">Custom Characters:</label>
      <textarea id="custom-charset" rows="2" placeholder="Paste or type your custom character set here..."></textarea>
      <button id="paste-charset-btn" class="paste-btn">Paste from Clipboard</button>
    </div>

    <div class="control-group">
      <label>Character Color:</label>
      <div class="toggle-group">
        <button class="toggle-btn active" data-color-target="character" data-mode="fixed">Fixed</button>
        <button class="toggle-btn" data-color-target="character" data-mode="neighbour">Neighbour</button>
      </div>
      <div class="color-picker-group hidden" id="character-color-picker">
        <input type="color" id="character-color" value="#ffffff">
      </div>
    </div>

    <div class="control-group">
      <label>Background Color:</label>
      <div class="toggle-group">
        <button class="toggle-btn active" data-color-target="background" data-mode="fixed">Fixed</button>
        <button class="toggle-btn" data-color-target="background" data-mode="neighbour">Neighbour</button>
      </div>
      <div class="color-picker-group hidden" id="background-color-picker">
        <input type="color" id="background-color" value="#000000">
      </div>
    </div>
  </div>

  <script type="module" src="/src/sketch2.js"></script>
</body>

</html>
